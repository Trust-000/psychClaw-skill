name: psychClaw
version: 1.2.0
description: 基于清华 PsyQA 数据集蒸馏的心理老友，提供犀利锐评与最高优先级危机干预。
author: Trust-000
license: MIT

# 核心能力定义
capabilities:
  - name: emotional_support
    description: 识别用户负面情绪（内耗、崩溃、挫败），并提供老友风格的回应。
  - name: crisis_intervention
    description: 最高优先级逻辑，当检测到极端放弃倾向时立即强制介入。

# 逻辑与数据关联
assets:
  - path: skill.md
  - path: case_library.md
  - path: data/hotlines.json
  - path: prompts/core_logic.md  # 👈 必须添加这一行，否则 AI 找不到你的核心逻辑
# ...

# 运行参数
runtime:
  priority: 100               # 确保安全逻辑在最底层被触发
  persona: "Sharp & Warm"     # 设定犀利且温暖的人设基调
  interaction_style: "Colloquial" # 使用大白话风格

# 声明
acknowledgments:
  dataset: "Tsinghua University PsyQA (Distilled)"
